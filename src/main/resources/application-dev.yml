server:
  port: 8080

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_prompt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 6000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: ${DRUID_USERNAME:admin}
        login-password: ${DRUID_PASSWORD:admin}
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000

  rabbitmq:
    host: localhost
    port: 5672
    virtual-host: /
    username: admin
    password: 123456
    listener:
      simple:
        prefetch: 10
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 4
          max-interval: 10000
          multiplier: 2

prompt:
  count:
    sync-delay-ms: 60000
    rescan-interval-ms: 300000

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      timeout: 3000ms


logging:
  level:
    com.jojo.prompt: debug
    com.jojo.prompt.mapper: debug

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-32-characters-long-for-hs256-algorithm}
  expire-time: 604800000
